services:
  # This will be auto-tagged as "repository" by AutoTagPass
  user.repo:
    constructor:
      func: "$this.NewUserRepository"
      args:
        - "%db_dsn%"

  # This will be auto-tagged as "repository" by AutoTagPass
  product.repo:
    constructor:
      func: "$this.NewProductRepository"
      args:
        - "%db_dsn%"

  # This will be auto-tagged as "http.handler" by AutoTagPass
  user.handler:
    constructor:
      func: "$this.NewUserHandler"
      args:
        - "@user.repo"
        - "@logger"  # Added by AddDefaultServicesPass
    tags:
      - { name: "slog", channel: "product" }

  # This will be auto-tagged as "http.handler" by AutoTagPass
  product.handler:
    constructor:
      func: "$this.NewProductHandler"
      args:
        - "@product.repo"
        - "@logger"
    tags:
      - { name: "slog", channel: "product" }
    public: true

  # Main HTTP server that uses all handlers
  server:
    constructor:
      func: "$this.NewServer"
      args:
        - "!tagged:http.handler"  # Gets all auto-tagged handlers
    public: true
