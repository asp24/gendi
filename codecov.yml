coverage:
  status:
    # Overall coverage of the whole project must not fall below the base
    # commit's coverage. `target: auto` compares against the PR base;
    # `threshold: 0%` means no drop is tolerated.
    project:
      default:
        target: auto
        threshold: 0%
        if_ci_failed: error
    # Coverage of the lines changed by the PR itself. Keeps new/modified
    # code covered; `informational: true` reports but does not block.
    patch:
      default:
        target: auto
        informational: true

# Post a summary comment on each PR.
comment:
  layout: "reach, diff, files"
  require_changes: false
